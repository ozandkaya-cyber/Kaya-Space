// ── Calculations ──────────────────────────────────────────────────────────────
function calcClientYear(c,y){
  const d=c.years[y], p=c.pricesY[y];
  let rev=0;
  if(c.model==="pct"){
    const tn=(d.s||0)+(d.v||0)+(d.r||0);
    rev=tn*p.lm_preis*(p.umsatz_pct/100);
  } else {
    rev=(d.s||0)*p.s+(d.v||0)*p.v+(d.r||0)*p.r+(d.e||0)*p.e+(d.a||0)*p.a+(d.u||0)*p.u;
  }
  ADDONS.forEach(ad=>{rev+=(d[ad.k]||0)*p[ad.k];});
  if(rev>0) rev+=p.admin;
  return Math.round(rev);
}
function calcYearTotal(cl,y){return cl.filter(c=>c.active).reduce((s,c)=>s+calcClientYear(c,y),0);}
function calcClientTotal(c){return YEARS.reduce((s,y)=>s+calcClientYear(c,y),0);}

function fmt(n){return new Intl.NumberFormat("de-CH",{style:"currency",currency:"CHF",maximumFractionDigits:0}).format(n);}
function fmtK(n){if(n>=1e6)return(n/1e6).toFixed(2).replace(/\.?0+$/,"")+"M";if(n>=1000)return(n/1000).toFixed(0)+"k";return String(Math.round(n));}
function ampel(c){if(!c.active)return"#c7c7cc";const t=calcClientTotal(c);if(t===0)return RD;if(c.prob<0.5)return OR;if(t<20000)return"#ffcc00";return GR;}

// ── SVG Charts ────────────────────────────────────────────────────────────────
function BarChart({data,color,h=200,multi}){
  const W=560,H=h,P={t:14,r:16,b:32,l:58};
  const vals=multi?data.flatMap(d=>d.vals):data.map(d=>d.v);
  const maxV=Math.max(...vals,1);
  const n=data.length;
  const slotW=(W-P.l-P.r)/n;
  const seriesN=multi?data[0].vals.length:1;
  const bw=Math.min(slotW*0.7/seriesN,32);
  return h_(
    h("svg",{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",overflow:"visible"}},
      [0,0.25,0.5,0.75,1].map((f,i)=>{
        const v=maxV*f,y=P.t+(H-P.t-P.b)*(1-f);
        return h("g",{key:i},
          h("line",{x1:P.l,x2:W-P.r,y1:y,y2:y,stroke:"#f0f0f4",strokeWidth:1}),
          h("text",{x:P.l-8,y:y+4,textAnchor:"end",fontSize:11,fill:SB,fontFamily:"Inter"},fmtK(v))
        );
      }),
      data.map((d,i)=>{
        const cx=P.l+i*slotW+slotW/2;
        if(multi){
          return h("g",{key:i},
            d.vals.map((v,j)=>{
              const bh=Math.max((H-P.t-P.b)*(v/maxV),0);
              const x=cx-(seriesN*bw+(seriesN-1)*2)/2+j*(bw+2);
              return h("rect",{key:j,x,y:P.t+(H-P.t-P.b)-bh,width:bw,height:bh,fill:d.colors?d.colors[j]:(color||BL),rx:5,opacity:.88});
            }),
            h("text",{x:cx,y:H-P.b+18,textAnchor:"middle",fontSize:11,fill:SB,fontFamily:"Inter"},d.l)
          );
        }
        const bh=Math.max((H-P.t-P.b)*(d.v/maxV),0);
        return h("g",{key:i},
          h("rect",{x:cx-bw/2,y:P.t+(H-P.t-P.b)-bh,width:bw,height:bh,fill:color||BL,rx:5}),
          bh>20&&h("text",{x:cx,y:P.t+(H-P.t-P.b)-bh-6,textAnchor:"middle",fontSize:10,fill:color||BL,fontFamily:"Inter",fontWeight:600},fmtK(d.v)),
          h("text",{x:cx,y:H-P.b+18,textAnchor:"middle",fontSize:11,fill:SB,fontFamily:"Inter"},d.l)
        );
      }),
      multi&&data[0].labels&&h("g",null,data[0].labels.map((l,i)=>h("g",{key:i,transform:`translate(${P.l+i*90},${H+8})`},
        h("rect",{x:0,y:0,width:12,height:12,fill:data[0].colors[i],rx:3}),
        h("text",{x:16,y:10,fontSize:10,fill:SB,fontFamily:"Inter"},l)
      )))
    )
  );
}

function h_(...args){return args.length===1?args[0]:h(React.Fragment,null,...args);}

function LineChart({series,labels,h:hh=220}){
  const W=560,H=hh,P={t:14,r:16,b:44,l:58};
  const allV=series.flatMap(s=>s.data);
  const maxV=Math.max(...allV,1);
  const xs=i=>P.l+i*(W-P.l-P.r)/(labels.length-1);
  const ys=v=>P.t+(H-P.t-P.b)*(1-v/maxV);
  return h("svg",{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",overflow:"visible"}},
    [0,.25,.5,.75,1].map((f,i)=>{
      const v=maxV*f,y=ys(v);
      return h("g",{key:i},
        h("line",{x1:P.l,x2:W-P.r,y1:y,y2:y,stroke:"#f0f0f4",strokeWidth:1}),
        h("text",{x:P.l-8,y:y+4,textAnchor:"end",fontSize:11,fill:SB,fontFamily:"Inter"},fmtK(v))
      );
    }),
    labels.map((l,i)=>h("text",{key:i,x:xs(i),y:H-P.b+18,textAnchor:"middle",fontSize:11,fill:SB,fontFamily:"Inter"},l)),
    series.map(s=>{
      const pts=s.data.map((v,i)=>`${xs(i)},${ys(v)}`).join(" ");
      return h("g",{key:s.name},
        h("polyline",{points:pts,fill:"none",stroke:s.color,strokeWidth:s.width||2.5,strokeDasharray:s.dash||"none",strokeLinecap:"round",strokeLinejoin:"round"}),
        s.dots!==false&&s.data.map((v,i)=>h("circle",{key:i,cx:xs(i),cy:ys(v),r:4,fill:"#fff",stroke:s.color,strokeWidth:2.5}))
      );
    }),
    series.map((s,i)=>h("g",{key:i,transform:`translate(${P.l+i*130},${H-10})`},
      h("line",{x1:0,x2:18,y1:0,y2:0,stroke:s.color,strokeWidth:s.width||2.5,strokeDasharray:s.dash||"none"}),
      h("text",{x:24,y:4,fontSize:11,fill:SB,fontFamily:"Inter"},s.name)
    ))
  );
}

// ── Mini Sparkline ────────────────────────────────────────────────────────────
function Spark({data,color}){
  const W=80,H=32,P=2;
  const max=Math.max(...data,1),min=Math.min(...data,0);
  const xs=i=>P+i*(W-2*P)/(data.length-1);
  const ys=v=>H-P-(H-2*P)*(v-min)/(max-min||1);
  const pts=data.map((v,i)=>`${xs(i)},${ys(v)}`).join(" ");
  return h("svg",{viewBox:`0 0 ${W} ${H}`,style:{width:W,height:H}},
    h("polyline",{points:pts,fill:"none",stroke:color||BL,strokeWidth:1.8,strokeLinecap:"round",strokeLinejoin:"round"})
  );
}

  const selC=clients.find(c=>c.id===sid)||null;

  function toast(msg,ok=true){setNote({msg,ok});setTimeout(()=>setNote(null),3500);}

  function updPrice(id,y,f,v){setClients(p=>p.map(c=>c.id===id?{...c,pricesY:{...c.pricesY,[y]:{...c.pricesY[y],[f]:parseFloat(v)||0}}}:c));}
  function updProp(id,f,v){setClients(p=>p.map(c=>c.id===id?{...c,[f]:v}:c));}

  function addClient(){
    if(!newName.trim())return;
    const id="client-"+Date.now();
    const color=COLORS[clients.length%COLORS.length];
    setClients(p=>[...p,{id,name:newName.trim(),prob:1,active:true,color,model:"fix",years:mkYears(),pricesY:mkPricesY()}]);
    setNewName("");setShowAddClient(false);setSid(id);setTab("kunden");
  }
  function removeClient(id){setClients(p=>p.filter(c=>c.id!==id));if(sid===id)setSid(null);}

  // Google Sheets
  async function loadFromSheets(){
    setGsState("loading");
    try{
      const res=await fetch(READ_URL);
      if(!res.ok)throw new Error("HTTP "+res.status);
      const json=await res.json();
      const raw=json.values&&json.values[0]&&json.values[0][0];
      if(!raw)throw new Error("Sheet leer");
      const d=JSON.parse(raw);
      if(d.clients)setClients(d.clients);
      if(d.sc)setSc(d.sc);
      if(d.savedAt)setLastSaved(d.savedAt);
      setGsState("ok");toast("Geladen ✓");setTimeout(()=>setGsState("idle"),3000);
    }catch(ex){setGsState("err");toast("Laden: "+ex.message,false);setTimeout(()=>setGsState("idle"),4000);}
  }

  async function saveToSheets(){
    if(!authToken){toast("Zuerst anmelden",false);return;}
    setGsState("saving");
    try{
      const payload={v:2,savedAt:new Date().toISOString(),clients,sc};
      const res=await fetch(WRITE_URL,{method:"PUT",headers:{"Authorization":"Bearer "+authToken,"Content-Type":"application/json"},body:JSON.stringify({values:[[JSON.stringify(payload)]]})});
      if(!res.ok)throw new Error("HTTP "+res.status);
      setLastSaved(payload.savedAt);setGsState("ok");toast("Gespeichert ✓");setTimeout(()=>setGsState("idle"),3000);
    }catch(ex){setGsState("err");toast("Speichern: "+ex.message,false);setTimeout(()=>setGsState("idle"),4000);}
  }

  function googleSignIn(){
    const SCOPE="https://www.googleapis.com/auth/spreadsheets";

  }

        )

      // Sidebar
      h("div",{className:"card",style:{padding:0,overflow:"hidden",alignSelf:"start"}},

      selC?h("div",{style:{display:"flex",flexDirection:"column",gap:14}},
        // Header
        h("div",{className:"card"},
          h("div",{style:{display:"flex",alignItems:"flex-start",gap:16,flexWrap:"wrap"}},
            h("div",{style:{width:14,height:14,borderRadius:"50%",background:ampel(selC),marginTop:4,boxShadow:"0 0 0 4px "+ampel(selC)+"22"}}),

          // Admin + Zusatzangebote
          h("div",{style:{marginTop:20,paddingTop:16,borderTop:"1px solid "+BD}},
            h("div",{style:{fontSize:12,color:SB,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em",marginBottom:14}},"Administrationspauschale & Zusatzangebote — "+sy),
            h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}},
              h("div",{style:{background:"#fff8f0",borderRadius:12,padding:"12px 14px",border:"1px solid "+OR+"33"}},
                h("div",{style:{fontSize:11,color:OR,fontWeight:600,textTransform:"uppercase",letterSpacing:".04em",marginBottom:6}},"Admin-Pauschale CHF"),
                h("input",{type:"number",min:0,value:selC.pricesY[sy].admin||0,onChange:e=>updPrice(selC.id,sy,"admin",e.target.value),
                  style:{...inp,fontSize:16,fontWeight:700},
                  onFocus:e=>e.target.style.borderBottomColor=OR,
                  onBlur:e=>e.target.style.borderBottomColor="#e8e8ed"})
              ),
              ...ADDONS.map(({k,l})=>h("div",{key:k,style:{background:BG,borderRadius:12,padding:"12px 14px"}},
                h("div",{style:{fontSize:11,color:SB,fontWeight:600,textTransform:"uppercase",letterSpacing:".04em",marginBottom:6}},l),
                h("div",{style:{display:"flex",gap:8}},
                  h("div",{style:{flex:1}},
                    h("div",{style:{fontSize:10,color:SB,marginBottom:3}},"Anzahl"),
                    h("input",{type:"number",min:0,value:selC.years[sy][k]||0,onChange:e=>updYear(selC.id,sy,k,e.target.value),
                      style:{...inp,fontSize:13},
                      onFocus:e=>e.target.style.borderBottomColor=BL,
                      onBlur:e=>e.target.style.borderBottomColor="#e8e8ed"})
                  ),
                  h("div",{style:{flex:1}},
                    h("div",{style:{fontSize:10,color:SB,marginBottom:3}},"Preis CHF"),
                    h("input",{type:"number",min:0,value:selC.pricesY[sy][k]||0,onChange:e=>updPrice(selC.id,sy,k,e.target.value),
                      style:{...inp,fontSize:13,color:BL},
                      onFocus:e=>e.target.style.borderBottomColor=BL,
                      onBlur:e=>e.target.style.borderBottomColor="#e8e8ed"})
                  )
                )
              ))
            )
          ),

          // Ertrag Summary
          h("div",{style:{marginTop:20,background:"linear-gradient(135deg,"+BL+"15,"+GR+"15)",borderRadius:14,padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("div",null,
              h("div",{style:{fontSize:13,color:SB,marginBottom:4}},"Gesamtertrag "+sy),
              h("div",{style:{fontSize:28,fontWeight:700,color:TX,letterSpacing:"-.03em"}},fmt(calcClientYear(selC,sy)))
            ),
            h("div",{style:{textAlign:"right"}},
              h("div",{style:{fontSize:13,color:SB,marginBottom:4}},"Gewichtet ("+Math.round(selC.prob*100)+"%)"),
              h("div",{style:{fontSize:22,fontWeight:600,color:GR}},fmt(calcClientYear(selC,sy)*selC.prob))
            )
          )
        )
      ):h("div",{className:"card",style:{display:"flex",alignItems:"center",justifyContent:"center",color:SB,fontSize:14,height:260,flexDirection:"column",gap:12}},
        h("div",{style:{fontSize:40}},"👈"),
        h("div",null,"Kunden aus der Liste auswählen oder neuen hinzufügen")
      )
    ),

    // ══ SIMULATION ════════════════════════════════════════════════════════════
    tab==="simulation"&&h("div",{className:"fade"},
      h("div",{className:"card",style:{marginBottom:14}},
        h("div",{style:{fontSize:15,fontWeight:700,color:TX,marginBottom:20}},"Szenario-Faktoren"),
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:20}},
          [["pess","Pessimistisch",RD],["opt","Optimistisch",GR]].map(([k,l,col])=>
            h("div",{key:k,style:{background:BG,borderRadius:16,padding:"20px 22px",border:"1px solid "+col+"22"}},
              h("div",{style:{fontSize:13,color:col,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}},l),
              h("div",{style:{display:"flex",alignItems:"center",gap:16}},
                h("input",{type:"range",min:-60,max:100,value:sc[k],onChange:e=>setSc(p=>({...p,[k]:parseInt(e.target.value)})),style:{flex:1,accentColor:col}}),
                h("div",{style:{fontSize:26,color:col,fontWeight:700,minWidth:64,textAlign:"right"}},sc[k]>0?"+":"",sc[k],"%")
              )
            )
          )
        )
      ),

      h("div",{className:"card",style:{marginBottom:14}},
        h("div",{style:{fontSize:15,fontWeight:700,color:TX,marginBottom:18}},"Szenario-Vergleich"),
        h(LineChart,{hh:280,labels:YEARS.map(String),series:[
          {name:"Basis",color:BL,width:3,data:yearData},
          {name:"Pessimistisch",color:RD,width:2,dash:"5,4",dots:true,data:yearData.map(v=>Math.round(v*(1+sc.pess/100)))},
          {name:"Optimistisch",color:GR,width:2,dash:"5,4",dots:true,data:yearData.map(v=>Math.round(v*(1+sc.opt/100)))}
        ]})
      ),

      h("div",{className:"card"},
        h("div",{style:{fontSize:15,fontWeight:700,color:TX,marginBottom:16}},"Tabelle"),
        h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:14}},
          h("thead",null,h("tr",null,["Jahr","Basis","Pessimistisch","Optimistisch","Diff Pess.","Diff Opt."].map(x=>
            h("th",{key:x,style:{padding:"10px 14px",textAlign:x==="Jahr"?"left":"right",color:SB,fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em",borderBottom:"2px solid "+BD}},x)
          ))),
          h("tbody",null,
            YEARS.map((y,i)=>{
              const b=yearData[i],p=Math.round(b*(1+sc.pess/100)),o=Math.round(b*(1+sc.opt/100));
              return h("tr",{key:y,style:{background:i%2===0?BG:"#fff"}},
                h("td",{style:{padding:"12px 14px",color:TX,fontWeight:700,fontSize:15}},y),
                h("td",{style:{padding:"12px 14px",textAlign:"right",color:TX,fontWeight:500}},fmt(b)),
                h("td",{style:{padding:"12px 14px",textAlign:"right",color:RD,fontWeight:500}},fmt(p)),
                h("td",{style:{padding:"12px 14px",textAlign:"right",color:GR,fontWeight:500}},fmt(o)),
                h("td",{style:{padding:"12px 14px",textAlign:"right",color:RD,fontSize:12}},fmt(p-b)),
                h("td",{style:{padding:"12px 14px",textAlign:"right",color:GR,fontSize:12}},"+"+fmt(o-b))
              );
            }),
            h("tr",{style:{borderTop:"2px solid "+BD,background:"#fff"}},
              h("td",{style:{padding:"12px 14px",color:TX,fontWeight:700}},"Total"),
              h("td",{style:{padding:"12px 14px",textAlign:"right",color:TX,fontWeight:700}},fmt(tG)),
              h("td",{style:{padding:"12px 14px",textAlign:"right",color:RD,fontWeight:700}},fmt(yearData.reduce((s,v)=>s+Math.round(v*(1+sc.pess/100)),0))),
              h("td",{style:{padding:"12px 14px",textAlign:"right",color:GR,fontWeight:700}},fmt(yearData.reduce((s,v)=>s+Math.round(v*(1+sc.opt/100)),0))),
              h("td"),h("td")
            )
          )
        )
      )
    ),

    // ══ DETAILS ════════════════════════════════════════════════════════════════
    tab==="details"&&h("div",{className:"fade"},
      h("div",{style:{display:"flex",gap:8,marginBottom:14}},
        YEARS.map(y=>h("button",{key:y,onClick:()=>setSy(y),
          style:{padding:"9px 22px",background:sy===y?BL:"#fff",border:sy===y?"none":"1px solid "+BD,color:sy===y?"#fff":SB,borderRadius:22,fontSize:14,fontWeight:sy===y?600:400,cursor:"pointer",boxShadow:sy===y?"0 4px 14px rgba(0,113,227,.3)":"none"}},y))
      ),
      h("div",{className:"card",style:{padding:0,overflow:"hidden"}},
        h("div",{style:{overflowX:"auto"}},
          h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:13}},
            h("thead",null,h("tr",{style:{background:BG}},
              ["Kunde","Modell","Prob.","Schule","Verlag","Ref.","Examen","Autor","Aufschalt",...ADDONS.map(a=>a.l.split("/")[0]),"Ertrag"].map(x=>
                h("th",{key:x,style:{padding:"12px 14px",textAlign:x==="Kunde"||x==="Modell"?"left":"right",color:SB,fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:".04em",borderBottom:"2px solid "+BD,whiteSpace:"nowrap"}},x)
              )
            )),
            h("tbody",null,
              clients.map((c,ci)=>{
                const yr=c.years[sy],rev=calcClientYear(c,sy);
                return h("tr",{key:c.id,style:{background:ci%2===0?BG:"#fff",opacity:c.active?1:.4}},
                  h("td",{style:{padding:"10px 14px",fontWeight:600,whiteSpace:"nowrap"}},
                    h("span",{style:{display:"inline-block",width:7,height:7,borderRadius:"50%",background:ampel(c),marginRight:9,verticalAlign:"middle"}}),c.name
                  ),
                  h("td",{style:{padding:"10px 14px",fontSize:11}},
                    h("span",{style:{padding:"2px 8px",borderRadius:10,background:c.model==="pct"?"#fff8e7":"#f0f7ff",color:c.model==="pct"?OR:BL,fontSize:11,fontWeight:500}},c.model==="pct"?"%":"Fix")
                  ),
                  h("td",{style:{padding:"10px 14px",textAlign:"right",color:SB}},Math.round(c.prob*100)+"%"),
                  ...["s","v","r","e","a","u",...ADDONS.map(a=>a.k)].map(k=>
                    h("td",{key:k,style:{padding:"6px 8px",textAlign:"right"}},
                      h("input",{type:"number",min:0,value:yr[k]||0,onChange:e=>updYear(c.id,sy,k,e.target.value),
                        style:{width:60,background:"transparent",border:"none",borderBottom:"1px solid "+(fc===`${c.id}-${sy}-${k}`?BL:BD),color:fc===`${c.id}-${sy}-${k}`?BL:TX,fontSize:12,textAlign:"right",padding:"2px 4px",outline:"none",fontFamily:"Inter"},
                        onFocus:()=>setFc(`${c.id}-${sy}-${k}`),onBlur:()=>setFc(null)})
                    )
                  ),
                  h("td",{style:{padding:"10px 14px",textAlign:"right",color:rev>0?GR:SB,fontWeight:700,fontSize:14,whiteSpace:"nowrap"}},fmt(rev))
                );
              }),
              h("tr",{style:{borderTop:"2px solid "+BD,background:"#fff"}},
                h("td",{colSpan:3+6+ADDONS.length,style:{padding:"12px 14px",color:TX,fontWeight:700,fontSize:14}},"Total "+sy),
                h("td",{style:{padding:"12px 14px",textAlign:"right",color:BL,fontWeight:700,fontSize:15}},fmt(calcYearTotal(clients,sy)))
              )
            )
          )
        )
      )
    )

    ), // end maxWidth div
    h("div",{style:{textAlign:"center",padding:"20px",fontSize:12,color:"#b0b0b8"}},"Timeline Education AG · CHF exkl. MWST · Laden kostenlos · Speichern mit Google-Anmeldung")
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
