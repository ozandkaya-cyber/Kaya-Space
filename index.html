<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Timeline Education — Ertragsprognose</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{background:#f0f2f5;color:#1a1a2e;font-family:'Inter',system-ui,sans-serif;min-height:100vh;font-size:14px}
button,input,select{font-family:inherit}
button{cursor:pointer;transition:all .15s}
input[type=range]{-webkit-appearance:none;height:4px;background:#e0e0e6;border-radius:2px;outline:none;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#0071e3;cursor:pointer;box-shadow:0 2px 6px rgba(0,113,227,.4)}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#c7c7cc;border-radius:3px}
.card{background:#fff;border-radius:20px;padding:24px 28px;box-shadow:0 2px 14px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04)}
.card-xs{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.03)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade{animation:fadeIn .2s ease}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}
.inp{background:transparent;border:none;border-bottom:2px solid #e5e5ea;padding:5px 2px;outline:none;width:100%;transition:border-color .15s;font-size:14px}
.inp:focus{border-bottom-color:#0071e3}
.inp-sm{background:transparent;border:none;border-bottom:1.5px solid #e5e5ea;padding:3px 2px;outline:none;font-size:13px;text-align:right;transition:border-color .15s;width:80px}
.inp-sm:focus{border-bottom-color:#0071e3}
.inp-sm:disabled{opacity:.4;cursor:not-allowed}
.inp:disabled{opacity:.4;cursor:not-allowed}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.btn-ghost{background:transparent;border:1.5px solid #e5e5ea;color:#6e6e73;border-radius:20px;padding:7px 16px;font-size:13px;font-weight:500}
.btn-ghost:hover{border-color:#0071e3;color:#0071e3}
.btn-primary{background:#0071e3;border:none;color:#fff;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:500}
.btn-primary:hover{background:#005bb5}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{background:transparent;border:1.5px solid #ff3b3044;color:#ff3b30;border-radius:16px;padding:5px 12px;font-size:12px}
.btn-danger:hover{background:#ff3b30;color:#fff}
.btn-success{background:#34c759;border:none;color:#fff;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:500}
.btn-success:hover{background:#28a745}
.btn-success:disabled{opacity:.5;cursor:not-allowed}
.tab-btn{background:transparent;border:none;padding:9px 18px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:400;color:#6e6e73}
.tab-btn.active{background:#fff;color:#0071e3;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.yr-btn{padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:400;border:1.5px solid #e5e5ea;background:#fff;color:#6e6e73}
.yr-btn.active{background:#0071e3;color:#fff;border-color:transparent;font-weight:600;box-shadow:0 4px 14px rgba(0,113,227,.3)}
.yr-btn-add{padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:2px dashed #d2d2d7;background:transparent;color:#8e8e93}
.yr-btn-add:hover{border-color:#0071e3;color:#0071e3}
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8e8e93;border-bottom:2px solid #f0f0f5}
th:first-child{text-align:left}
td{padding:9px 12px;text-align:right;font-size:13px;border-bottom:1px solid #f5f5f8}
td:first-child{text-align:left}
tr:hover td{background:#fafafe}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal{background:#fff;border-radius:22px;padding:28px;width:520px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.lock-banner{background:linear-gradient(135deg,#fff8e7,#fff3cd);border-bottom:1px solid #f5d174;padding:9px 24px;font-size:12px;color:#92400e;display:flex;align-items:center;gap:8px}
.edit-banner{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-bottom:1px solid #86efac;padding:9px 24px;font-size:12px;color:#166534;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect}=React;
const ce=React.createElement;

// ── Config ────────────────────────────────────────────────────────────────────
const EDIT_PASSWORD="Timeline2025!";
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyRfXVyGxIr-d0aSqJwwpky1ILSf-a37gh7RaltiDCwm6ChxfcvPixPvMrKVbbjd3rYvw/exec";

// ── Colors ────────────────────────────────────────────────────────────────────
const BL="#0071e3",GR="#34c759",RD="#ff3b30",OR="#ff9500",SB="#6e6e73",BD="#e5e5ea",BG="#f0f2f5",TX="#1a1a2e";
const PALETTE=["#0071e3","#5e5ce6","#30d158","#ff453a","#ff9f0a","#64d2ff","#bf5af2","#ff2d55","#32ade6","#ac8e68","#34c759","#ff6b6b","#4ecdc4","#ffd93d","#6bcb77"];

// ── Default data ──────────────────────────────────────────────────────────────
const DEF_YEARS=[2024,2025,2026,2027,2028];
const DEF_PRODUCTS=[
  {id:"schule",    name:"Schullizenz",          type:"fix", defaultPrice:150, note:"pro Lernende/r"},
  {id:"verlag",    name:"Verlagslizenz",         type:"fix", defaultPrice:60,  note:"pro TN"},
  {id:"referent",  name:"Referentenlizenz",      type:"fix", defaultPrice:200, note:"pro Person"},
  {id:"examen",    name:"Prüfungsplattform",     type:"fix", defaultPrice:65,  note:"pro TN"},
  {id:"autor",     name:"Autorenlizenz",         type:"fix", defaultPrice:150, note:"pro Person"},
  {id:"aufschalt", name:"Aufschaltgebühr",       type:"fix", defaultPrice:1500,note:"einmalig"},
  {id:"videocall", name:"Videokonferenz",        type:"fix", defaultPrice:0,   note:"nach Nutzung"},
  {id:"ki_import", name:"KI-Importer",           type:"fix", defaultPrice:0,   note:"nach Nutzung"},
  {id:"ki_learn",  name:"KI-Lernbegleiter",      type:"fix", defaultPrice:0,   note:"nach Nutzung"},
  {id:"api",       name:"Schnittstelle/API",     type:"fix", defaultPrice:0,   note:"nach Aufwand"},
  {id:"schulung",  name:"Schulungen",            type:"fix", defaultPrice:0,   note:"nach Aufwand"},
  {id:"sle_pct",   name:"SLE Umsatzbeteiligung", type:"pct", defaultPrice:18,  note:"% vom Verkaufspreis"},
  {id:"lm_pct",    name:"Lehrmittel Umsatz-%",   type:"pct", defaultPrice:18,  note:"% vom Nettoumsatz"},
];

function makeClientData(years,products){
  const volumes={},prices={},lmPrices={},admin={};
  years.forEach(y=>{
    volumes[y]={};prices[y]={};lmPrices[y]={};admin[y]=1500;
    products.forEach(p=>{volumes[y][p.id]=0;prices[y][p.id]=p.defaultPrice;lmPrices[y][p.id]=p.type==="pct"?100:0;});
  });
  return {volumes,prices,lmPrices,admin};
}

function calcRev(client,year,products){
  const v=client.volumes[year]||{},p=client.prices[year]||{},lm=client.lmPrices[year]||{},adm=client.admin[year]||0;
  let rev=0;
  products.forEach(prod=>{
    const qty=v[prod.id]||0;if(!qty)return;
    rev+=prod.type==="pct"?qty*(lm[prod.id]||100)*((p[prod.id]||prod.defaultPrice)/100):qty*(p[prod.id]||prod.defaultPrice);
  });
  return rev>0?Math.round(rev+adm):0;
}
function calcYearTotal(clients,year,products){return clients.filter(c=>c.active).reduce((s,c)=>s+calcRev(c,year,products),0);}
function calcClientTotal(client,years,products){return years.reduce((s,y)=>s+calcRev(client,y,products),0);}
function fmt(n){return new Intl.NumberFormat("de-CH",{style:"currency",currency:"CHF",maximumFractionDigits:0}).format(n);}
function fmtK(n){return n>=1e6?(n/1e6).toFixed(1).replace(/\.0$/,"")+"M":n>=1000?(n/1000).toFixed(0)+"k":String(Math.round(n));}
function ampel(c,years,products){if(!c.active)return"#c7c7cc";const t=calcClientTotal(c,years,products);return t===0?RD:c.prob<0.5?OR:t<20000?"#ffcc00":GR;}
function uid(){return"id-"+Math.random().toString(36).slice(2,8);}

// ── Charts ────────────────────────────────────────────────────────────────────
function BarChart({data,color,height=200}){
  const W=540,H=height,P={t:12,r:12,b:30,l:54};
  const max=Math.max(...data.map(d=>d.v),1);
  const n=data.length,slotW=(W-P.l-P.r)/n,bw=Math.min(slotW*.6,40);
  return ce("svg",{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",overflow:"visible"}},
    [0,.25,.5,.75,1].map((f,i)=>{const v=max*f,y=P.t+(H-P.t-P.b)*(1-f);return ce("g",{key:i},ce("line",{x1:P.l,x2:W-P.r,y1:y,y2:y,stroke:"#f0f0f4",strokeWidth:1}),ce("text",{x:P.l-6,y:y+4,textAnchor:"end",fontSize:10,fill:SB},fmtK(v)));}),
    data.map((d,i)=>{const cx=P.l+i*slotW+slotW/2,bh=Math.max((H-P.t-P.b)*(d.v/max),0),y=P.t+(H-P.t-P.b)-bh;return ce("g",{key:i},ce("rect",{x:cx-bw/2,y,width:bw,height:bh,fill:d.color||color||BL,rx:5,opacity:.9}),bh>18&&ce("text",{x:cx,y:y-5,textAnchor:"middle",fontSize:10,fill:d.color||color||BL,fontWeight:600},fmtK(d.v)),ce("text",{x:cx,y:H-P.b+16,textAnchor:"middle",fontSize:10,fill:SB},d.l));})
  );
}

function LineChart({series,labels,height=220}){
  const W=540,H=height,P={t:12,r:12,b:40,l:54};
  const max=Math.max(...series.flatMap(s=>s.data),1);
  const xs=i=>P.l+i*(W-P.l-P.r)/(Math.max(labels.length-1,1));
  const ys=v=>P.t+(H-P.t-P.b)*(1-v/max);
  return ce("svg",{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",overflow:"visible"}},
    [0,.25,.5,.75,1].map((f,i)=>{const v=max*f,y=ys(v);return ce("g",{key:i},ce("line",{x1:P.l,x2:W-P.r,y1:y,y2:y,stroke:"#f0f0f4",strokeWidth:1}),ce("text",{x:P.l-6,y:y+4,textAnchor:"end",fontSize:10,fill:SB},fmtK(v)));}),
    labels.map((l,i)=>ce("text",{key:i,x:xs(i),y:H-P.b+16,textAnchor:"middle",fontSize:10,fill:SB},l)),
    series.map(s=>ce("g",{key:s.name},
      ce("polyline",{points:s.data.map((v,i)=>`${xs(i)},${ys(v)}`).join(" "),fill:"none",stroke:s.color,strokeWidth:s.w||2.5,strokeDasharray:s.dash||"none",strokeLinecap:"round",strokeLinejoin:"round"}),
      s.dots!==false&&s.data.map((v,i)=>ce("circle",{key:i,cx:xs(i),cy:ys(v),r:3.5,fill:"#fff",stroke:s.color,strokeWidth:2.5}))
    )),
    series.map((s,i)=>ce("g",{key:i,transform:`translate(${P.l+i*120},${H-6})`},ce("line",{x1:0,x2:16,y1:0,y2:0,stroke:s.color,strokeWidth:s.w||2.5,strokeDasharray:s.dash||"none"}),ce("text",{x:20,y:4,fontSize:10,fill:SB},s.name)))
  );
}

function Spark({data,color}){
  const W=72,H=28,P=2,max=Math.max(...data,1);
  const xs=i=>P+i*(W-2*P)/(Math.max(data.length-1,1));
  const ys=v=>H-P-(H-2*P)*(v/max);
  return ce("svg",{viewBox:`0 0 ${W} ${H}`,style:{width:W,height:H}},
    ce("polyline",{points:data.map((v,i)=>`${xs(i)},${ys(v)}`).join(" "),fill:"none",stroke:color||BL,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"})
  );
}

function Modal({onClose,children}){
  return ce("div",{className:"modal-bg",onClick:e=>{if(e.target===e.currentTarget)onClose();}},ce("div",{className:"modal"},children));
}

// ── Default clients ───────────────────────────────────────────────────────────
function buildDefClients(){
  function mk(id,name,color,prob=1,active=true){const d=makeClientData(DEF_YEARS,DEF_PRODUCTS);return {id,name,color,prob,active,volumes:d.volumes,prices:d.prices,lmPrices:d.lmPrices,admin:d.admin};}
  function sv(c,y,pid,v){if(c.volumes[y])c.volumes[y][pid]=v;}
  function sp(c,y,pid,v){if(c.prices[y])c.prices[y][pid]=v;}
  const hkv=mk("hkv-aarau","HKV Aarau","#0071e3");
  DEF_YEARS.forEach((y,i)=>{sv(hkv,y,"schule",[1546,1748,1750,1750,1750][i]);sv(hkv,y,"referent",[104,94,90,90,90][i]);});
  const bzf=mk("bzf","BZF Fricktal","#5e5ce6");
  DEF_YEARS.forEach((y,i)=>{sv(bzf,y,"schule",[154,197,220,200,200][i]);sv(bzf,y,"referent",[10,10,15,15,15][i]);});
  const fo=mk("fo-edu","FO Education","#30d158");
  DEF_YEARS.forEach((y,i)=>{sv(fo,y,"verlag",[444,480,350,550,550][i]);sv(fo,y,"autor",[7,12,18,20,20][i]);sv(fo,y,"aufschalt",[0,1,1,1,1][i]);DEF_YEARS.forEach(yr=>{sp(fo,yr,"schule",60);sp(fo,yr,"verlag",60);});});
  const ep=mk("edupool","KV edupool","#ff453a");
  DEF_YEARS.forEach((y,i)=>{sv(ep,y,"verlag",[0,418,1881,2181,2781][i]);sv(ep,y,"referent",[0,79,180,0,0][i]);sv(ep,y,"examen",[0,0,700,1000,750][i]);sv(ep,y,"autor",[8,8,8,150,120][i]);sv(ep,y,"aufschalt",[1,1,1,0,0][i]);sp(ep,y,"referent",100);});
  const sib=mk("sib","SIB","#ff9f0a",0.7);
  DEF_YEARS.forEach((y,i)=>{sv(sib,y,"schule",[0,0,0,20,50][i]);sv(sib,y,"referent",[0,0,5,5,5][i]);DEF_YEARS.forEach(yr=>sp(sib,yr,"schule",175));});
  const bsl=mk("bsl","BSL Lenzburg","#64d2ff",0.5);
  const hkvs=mk("hkv-swiss","HKV Swiss","#bf5af2");
  DEF_YEARS.forEach((y,i)=>{sv(hkvs,y,"schule",[15,64,200,250,300][i]);sv(hkvs,y,"referent",[9,5,20,20,20][i]);});
  const esbb=mk("edupool-sbb","edupool SBB","#ff2d55");
  DEF_YEARS.forEach((y,i)=>{sv(esbb,y,"schule",[0,350,350,350,350][i]);DEF_YEARS.forEach(yr=>sp(esbb,yr,"schule",60));});
  const kvb=mk("kv-basel","KV Basel","#32ade6");
  DEF_YEARS.forEach(y=>{sv(kvb,y,"schule",1);sp(kvb,y,"schule",10000);});
  const sa=mk("swiss-acc","Swiss Acc.","#4ecdc4");
  DEF_YEARS.forEach((y,i)=>{sv(sa,y,"schule",[0,0,0,100,100][i]);sv(sa,y,"verlag",[0,0,100,0,0][i]);DEF_YEARS.forEach(yr=>sp(sa,yr,"schule",175));});
  const lb=mk("liebegg","Liebegg","#34c759");
  DEF_YEARS.forEach((y,i)=>{sv(lb,y,"schule",[0,0,40,100,200][i]);sv(lb,y,"referent",[0,0,10,0,0][i]);sv(lb,y,"aufschalt",[0,0,1,0,0][i]);DEF_YEARS.forEach(yr=>sp(lb,yr,"schule",135));});
  const iffp=mk("iffp","IfFP","#ac8e68",0.7);
  return [hkv,bzf,fo,ep,sib,bsl,hkvs,esbb,kvb,sa,lb,iffp];
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [years,setYears]=useState(DEF_YEARS);
  const [products,setProducts]=useState(DEF_PRODUCTS);
  const [clients,setClients]=useState(buildDefClients);
  const [tab,setTab]=useState("overview");
  const [selClientId,setSelClientId]=useState(null);
  const [selYear,setSelYear]=useState(2025);
  const [sc,setSc]=useState({pess:-15,opt:20});
  const [modal,setModal]=useState(null);
  const [note,setNote]=useState(null);
  const [gsState,setGsState]=useState("idle");
  const [lastSaved,setLastSaved]=useState(null);
  const [history,setHistory]=useState([]);
  // Edit mode via password
  const [editMode,setEditMode]=useState(false);
  const [pwInput,setPwInput]=useState("");
  const [pwError,setPwError]=useState(false);

  const selC=clients.find(c=>c.id===selClientId)||null;
  const ED=editMode; // shorthand

  function toast(msg,ok=true){setNote({msg,ok});setTimeout(()=>setNote(null),3500);}

  function tryUnlock(){
    if(pwInput===EDIT_PASSWORD){setEditMode(true);setModal(null);setPwInput("");setPwError(false);toast("Bearbeitungsmodus aktiviert ✓");}
    else{setPwError(true);setTimeout(()=>setPwError(false),2000);}
  }

  // Mutations (only when editMode)
  function setVol(cid,y,pid,v){if(!ED)return;setClients(p=>p.map(c=>c.id===cid?{...c,volumes:{...c.volumes,[y]:{...c.volumes[y],[pid]:parseFloat(v)||0}}}:c));}
  function setPrice(cid,y,pid,v){if(!ED)return;setClients(p=>p.map(c=>c.id===cid?{...c,prices:{...c.prices,[y]:{...c.prices[y],[pid]:parseFloat(v)||0}}}:c));}
  function setLmPrice(cid,y,pid,v){if(!ED)return;setClients(p=>p.map(c=>c.id===cid?{...c,lmPrices:{...c.lmPrices,[y]:{...c.lmPrices[y],[pid]:parseFloat(v)||0}}}:c));}
  function setAdmin(cid,y,v){if(!ED)return;setClients(p=>p.map(c=>c.id===cid?{...c,admin:{...c.admin,[y]:parseFloat(v)||0}}:c));}
  function setProp(cid,f,v){if(!ED)return;setClients(p=>p.map(c=>c.id===cid?{...c,[f]:v}:c));}

  function addYear(){
    if(!ED){setModal({type:"pw"});return;}
    const next=years[years.length-1]+1,lastY=years[years.length-1];
    setYears(p=>[...p,next]);
    setClients(p=>p.map(c=>{
      const lp=c.prices[lastY]||{},ll=c.lmPrices[lastY]||{};
      const nv={},np={},nl={};
      products.forEach(pr=>{nv[pr.id]=0;np[pr.id]=lp[pr.id]||pr.defaultPrice;nl[pr.id]=ll[pr.id]||0;});
      return {...c,volumes:{...c.volumes,[next]:nv},prices:{...c.prices,[next]:np},lmPrices:{...c.lmPrices,[next]:nl},admin:{...c.admin,[next]:c.admin[lastY]||1500}};
    }));
    setSelYear(next);
  }

  function removeYear(y){
    if(!ED){setModal({type:"pw"});return;}
    if(years.length<=2){toast("Mindestens 2 Jahre nötig",false);return;}
    const input=window.prompt("Jahr "+y+" löschen? Diese Aktion kann nur durch Wiederherstellen einer früheren Version rückgängig gemacht werden.\n\nZur Bestätigung das Jahr als Zahl eingeben:");
    if(input!==String(y)){toast("Abgebrochen",false);return;}
    setYears(p=>p.filter(yr=>yr!==y));
    setClients(p=>p.map(c=>{const nv={...c.volumes},np={...c.prices},nl={...c.lmPrices},na={...c.admin};delete nv[y];delete np[y];delete nl[y];delete na[y];return {...c,volumes:nv,prices:np,lmPrices:nl,admin:na};}));
    if(selYear===y)setSelYear(years[years.length-2]);
  }

  function addProduct(name,type,defaultPrice,note){
    if(!ED)return;
    const id=uid(),prod={id,name,type,defaultPrice:parseFloat(defaultPrice)||0,note:note||""};
    setProducts(p=>[...p,prod]);
    setClients(p=>p.map(c=>{
      const nv={...c.volumes},np={...c.prices},nl={...c.lmPrices};
      years.forEach(y=>{nv[y]={...nv[y],[id]:0};np[y]={...np[y],[id]:parseFloat(defaultPrice)||0};nl[y]={...nl[y],[id]:type==="pct"?100:0};});
      return {...c,volumes:nv,prices:np,lmPrices:nl};
    }));
    setModal(null);toast("Produkt '"+name+"' hinzugefügt ✓");
  }

  function removeProduct(pid){
    if(!ED)return;
    setProducts(p=>p.filter(pr=>pr.id!==pid));
    setClients(p=>p.map(c=>{const nv={...c.volumes},np={...c.prices},nl={...c.lmPrices};years.forEach(y=>{delete nv[y][pid];delete np[y][pid];delete nl[y][pid];});return {...c,volumes:nv,prices:np,lmPrices:nl};}));
  }

  function addClient(name){
    if(!ED)return;
    const id=uid(),color=PALETTE[clients.length%PALETTE.length],d=makeClientData(years,products);
    setClients(p=>[...p,{id,name,color,prob:1,active:true,volumes:d.volumes,prices:d.prices,lmPrices:d.lmPrices,admin:d.admin}]);

    try{

      if(!res.ok)throw new Error("HTTP "+res.status);
      const txt=await res.text();
      if(!txt||txt==="{}")throw new Error("Sheet noch leer — bitte zuerst speichern");
      const d=JSON.parse(txt);
      if(d.clients)setClients(d.clients);
      if(d.products)setProducts(d.products);
      if(d.years)setYears(d.years);
      if(d.sc)setSc(d.sc);
      if(d.savedAt)setLastSaved(d.savedAt);
      if(d.history)setHistory(d.history);
      setGsState("ok");toast("Geladen ✓  Stand: "+new Date(d.savedAt).toLocaleString("de-CH"));
      setTimeout(()=>setGsState("idle"),3000);
    }catch(ex){setGsState("err");toast("Laden: "+ex.message,false);setTimeout(()=>setGsState("idle"),4000);}
  }

  async function saveToSheets(){
    if(!ED){setModal({type:"pw"});return;}
    setGsState("saving");
    try{
      const now=new Date().toISOString();
      const snapshot={clients,products,years,sc,savedAt:now};
      const newHistory=[snapshot,...history.slice(0,19)];
      const payload={v:3,savedAt:now,clients,products,years,sc,history:newHistory};
      // GET with ?save= parameter — no CORS possible with GET
      const saveData=encodeURIComponent(JSON.stringify(payload));
      const res=await fetch(SCRIPT_URL+"?save="+saveData);
      const txt=await res.text();
      if(txt.trim()!=="ok")throw new Error("Script Fehler: "+txt.slice(0,80));
      setHistory(newHistory);setLastSaved(now);
      setGsState("ok");toast("Gespeichert ✓  ("+newHistory.length+" Versionen im Verlauf)");
      setTimeout(()=>setGsState("idle"),3000);
    }catch(ex){setGsState("err");toast("Speichern fehlgeschlagen: "+ex.message,false);setTimeout(()=>setGsState("idle"),5000);}

              ce("input",{type:"number",min:0,value:selC.admin[selYear]||0,onChange:e=>setAdmin(selC.id,selYear,e.target.value),disabled:!ED,className:"inp-sm",style:{fontSize:14,fontWeight:600}})
            )
          ),
          ce("table",null,
            ce("thead",null,ce("tr",null,["Produkt","Typ","Menge","Preis / %","LM-Preis","Ertrag"].map(h=>ce("th",{key:h,style:{textAlign:h==="Produkt"||h==="Typ"?"left":"right"}},h)))),
            ce("tbody",null,
              products.map(prod=>{
                const qty=(selC.volumes[selYear]||{})[prod.id]||0;
                const price=(selC.prices[selYear]||{})[prod.id]||prod.defaultPrice;
                const lmP=(selC.lmPrices[selYear]||{})[prod.id]||0;
                let rev=0;if(qty>0){rev=prod.type==="pct"?qty*lmP*(price/100):qty*price;}
                return ce("tr",{key:prod.id},
                  ce("td",{style:{fontWeight:500}},ce("div",null,prod.name),ce("div",{style:{fontSize:11,color:SB}},prod.note)),
                  ce("td",{style:{textAlign:"left"}},ce("span",{className:"tag",style:{background:prod.type==="pct"?"#fff8e7":"#f0f7ff",color:prod.type==="pct"?OR:BL}},prod.type==="pct"?"% Umsatz":"Fix")),
                  ce("td",null,ce("input",{type:"number",min:0,value:qty,onChange:e=>setVol(selC.id,selYear,prod.id,e.target.value),disabled:!ED,className:"inp-sm"})),
                  ce("td",null,ce("div",{style:{display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end"}},
                    ce("input",{type:"number",min:0,value:price,onChange:e=>setPrice(selC.id,selYear,prod.id,e.target.value),disabled:!ED,className:"inp-sm",style:{color:BL}}),
                    ce("span",{style:{fontSize:11,color:SB}},prod.type==="pct"?"%":"CHF")
                  )),
                  ce("td",null,prod.type==="pct"?ce("input",{type:"number",min:0,value:lmP,onChange:e=>setLmPrice(selC.id,selYear,prod.id,e.target.value),disabled:!ED,className:"inp-sm"}):ce("span",{style:{color:SB}},"–")),
                  ce("td",{style:{fontWeight:600,color:rev>0?TX:SB,fontSize:14}},rev>0?fmt(rev):"–")
                );
              }),
              ce("tr",{style:{borderTop:"2px solid "+BD}},
                ce("td",{colSpan:5,style:{fontWeight:700,fontSize:14,paddingTop:12}},"Gesamtertrag "+selYear),
                ce("td",{style:{fontWeight:700,fontSize:16,color:BL,paddingTop:12}},fmt(calcRev(selC,selYear,products)))
              )
            )
          )
        ),
        ce("div",{className:"card"},
          ce("div",{style:{fontSize:15,fontWeight:700,color:TX,marginBottom:16}},"Ertragsverlauf"),
          ce(BarChart,{height:200,color:selC.color||BL,data:years.map(y=>({l:String(y),v:calcRev(selC,y,products)}))})
        )
      ):ce("div",{className:"card",style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,height:280,color:SB}},
        ce("div",{style:{fontSize:36}},"👈"),
        ce("div",{style:{fontSize:14}},"Kunden auswählen oder neuen hinzufügen"),
        ED&&ce("button",{className:"btn-primary",onClick:()=>setModal({type:"addClient"})},"+ Neuer Kunde")
      )
    ),

    // ══ PRODUKTE ══
    tab==="produkte"&&ce("div",{className:"fade"},
      ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        ce("div",null,
          ce("div",{style:{fontSize:18,fontWeight:700,color:TX}},"Produkte & Dienstleistungen"),
          ce("div",{style:{fontSize:13,color:SB,marginTop:3}},"Fix = Preis × Menge  ·  % Umsatz = TN × LM-Preis × Prozentsatz")
        ),
        ED&&ce("button",{className:"btn-primary",onClick:()=>setModal({type:"addProduct"})},"+  Produkt hinzufügen")
      ),
      ce("div",{className:"card",style:{padding:0,overflow:"hidden"}},
        ce("table",null,
          ce("thead",null,ce("tr",null,
            ["Produkt","Beschreibung","Typ","Standardpreis","Eingesetzt bei","Aktionen"].map(h=>ce("th",{key:h,style:{textAlign:h==="Aktionen"?"center":"left"}},h))
          )),
          ce("tbody",null,
            products.map(prod=>{
              const usedBy=clients.filter(c=>years.some(y=>(c.volumes[y]||{})[prod.id]>0));
              return ce("tr",{key:prod.id},
                ce("td",{style:{fontWeight:600}},prod.name),
                ce("td",{style:{color:SB,fontSize:12}},prod.note||"–"),
                ce("td",null,ce("span",{className:"tag",style:{background:prod.type==="pct"?"#fff8e7":"#f0f7ff",color:prod.type==="pct"?OR:BL}},prod.type==="pct"?"% Umsatz":"Fix CHF")),
                ce("td",null,prod.type==="pct"?prod.defaultPrice+"%":"CHF "+prod.defaultPrice),
                ce("td",null,usedBy.length>0?ce("div",{style:{display:"flex",gap:4,flexWrap:"wrap"}},usedBy.map(c=>ce("span",{key:c.id,className:"tag",style:{background:"#f0f2f5",color:TX}},c.name))):ce("span",{style:{fontSize:12,color:SB}},"–")),
                ce("td",{style:{textAlign:"center"}},ED&&usedBy.length===0&&ce("button",{className:"btn-danger",onClick:()=>{if(confirm("'"+prod.name+"' löschen?"))removeProduct(prod.id);}},"Löschen"))
              );
            })
          )
        )
      )
    ),

    // ══ SIMULATION ══
    tab==="simulation"&&ce("div",{className:"fade"},
      ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}},
        [["pess","Pessimistisch",RD],["opt","Optimistisch",GR]].map(([k,l,col])=>
          ce("div",{key:k,className:"card"},
            ce("div",{style:{fontSize:13,fontWeight:700,color:col,textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}},l),
            ce("div",{style:{display:"flex",alignItems:"center",gap:16}},
              ce("input",{type:"range",min:-60,max:100,value:sc[k],onChange:e=>setSc(p=>({...p,[k]:parseInt(e.target.value)})),disabled:!ED,style:{flex:1,accentColor:col}}),
              ce("div",{style:{fontSize:28,fontWeight:700,color:col,minWidth:64,textAlign:"right"}},sc[k]>0?"+":"",sc[k],"%")
            )
          )
        )
      ),
      ce("div",{className:"card",style:{marginBottom:12}},
        ce("div",{style:{fontSize:15,fontWeight:700,color:TX,marginBottom:18}},"Szenario-Chart"),
        ce(LineChart,{height:280,labels:years.map(String),series:[
          {name:"Basis",color:BL,w:3,data:yearTotals},
          {name:"Pessimistisch",color:RD,w:2,dash:"5,4",data:yearTotals.map(v=>Math.round(v*(1+sc.pess/100)))},
          {name:"Optimistisch",color:GR,w:2,dash:"5,4",data:yearTotals.map(v=>Math.round(v*(1+sc.opt/100)))}
        ]})
      ),
      ce("div",{className:"card"},
        ce("table",null,
          ce("thead",null,ce("tr",null,["Jahr","Basis","Pessimistisch","Δ","Optimistisch","Δ"].map(h=>ce("th",{key:h,style:{textAlign:h==="Jahr"?"left":"right"}},h)))),
          ce("tbody",null,
            years.map((y,i)=>{const b=yearTotals[i],p=Math.round(b*(1+sc.pess/100)),o=Math.round(b*(1+sc.opt/100));
              return ce("tr",{key:y},ce("td",{style:{fontWeight:700,fontSize:15}},y),ce("td",{style:{color:TX}},fmt(b)),ce("td",{style:{color:RD}},fmt(p)),ce("td",{style:{color:RD,fontSize:12}},fmt(p-b)),ce("td",{style:{color:GR}},fmt(o)),ce("td",{style:{color:GR,fontSize:12}},"+"+fmt(o-b)));
            }),
            ce("tr",{style:{borderTop:"2px solid "+BD}},
              ce("td",{style:{fontWeight:700}},"Total"),ce("td",{style:{fontWeight:700,color:TX}},fmt(tG)),
              ce("td",{style:{fontWeight:700,color:RD}},fmt(yearTotals.reduce((s,v)=>s+Math.round(v*(1+sc.pess/100)),0))),ce("td"),
              ce("td",{style:{fontWeight:700,color:GR}},fmt(yearTotals.reduce((s,v)=>s+Math.round(v*(1+sc.opt/100)),0))),ce("td")
            )
          )
        )
      )
    )
    ),

    ce("div",{style:{textAlign:"center",padding:"20px",fontSize:11,color:"#b0b0b8"}},
      "Timeline Education AG · Ansicht: frei · Bearbeiten & Speichern: Passwort nötig"
    )
  );
}

function AddClientModal({onAdd,onClose}){
  const [name,setName]=React.useState("");
  return ce("div",null,
    ce("div",{style:{fontSize:18,fontWeight:700,marginBottom:4}},"Neuen Kunden hinzufügen"),
    ce("div",{style:{fontSize:13,color:"#6e6e73",marginBottom:20}},"Wird mit allen Produkten und Jahren angelegt."),
    ce("input",{type:"text",value:name,onChange:e=>setName(e.target.value),placeholder:"Kundenname…",className:"inp",style:{fontSize:15,marginBottom:20},autoFocus:true,onKeyDown:e=>e.key==="Enter"&&name.trim()&&onAdd(name.trim())}),
    ce("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
      ce("button",{className:"btn-ghost",onClick:onClose},"Abbrechen"),
      ce("button",{className:"btn-primary",onClick:()=>name.trim()&&onAdd(name.trim()),disabled:!name.trim()},"Hinzufügen")
    )
  );
}

function AddProductModal({onAdd,onClose}){
  const [name,setName]=React.useState("");
  const [type,setType]=React.useState("fix");
  const [price,setPrice]=React.useState("");
  const [note,setNote]=React.useState("");
  return ce("div",null,
    ce("div",{style:{fontSize:18,fontWeight:700,marginBottom:4}},"Neues Produkt / Dienstleistung"),
    ce("div",{style:{fontSize:13,color:"#6e6e73",marginBottom:20}},"Wird für alle Kunden und Jahre hinzugefügt."),
    ce("div",{style:{display:"flex",flexDirection:"column",gap:14}},
      ce("div",null,ce("div",{style:{fontSize:11,color:"#6e6e73",fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",marginBottom:5}},"Name"),ce("input",{type:"text",value:name,onChange:e=>setName(e.target.value),placeholder:"z.B. Premium-Support…",className:"inp",autoFocus:true})),
      ce("div",null,
        ce("div",{style:{fontSize:11,color:"#6e6e73",fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}},"Preismodell"),
        ce("div",{style:{display:"flex",gap:8}},
          ce("button",{onClick:()=>setType("fix"),style:{flex:1,padding:"10px",borderRadius:12,border:"2px solid "+(type==="fix"?"#0071e3":"#e5e5ea"),background:type==="fix"?"#f0f7ff":"#fff",color:type==="fix"?"#0071e3":"#6e6e73",fontWeight:type==="fix"?600:400,cursor:"pointer"}},ce("div",{style:{fontSize:14,marginBottom:3}},"Fix CHF"),ce("div",{style:{fontSize:11}},"Preis × Menge")),
          ce("button",{onClick:()=>setType("pct"),style:{flex:1,padding:"10px",borderRadius:12,border:"2px solid "+(type==="pct"?"#ff9500":"#e5e5ea"),background:type==="pct"?"#fff8e7":"#fff",color:type==="pct"?"#ff9500":"#6e6e73",fontWeight:type==="pct"?600:400,cursor:"pointer"}},ce("div",{style:{fontSize:14,marginBottom:3}},"% Umsatz"),ce("div",{style:{fontSize:11}},"TN × LM-Preis × %"))
        )
      ),
      ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}},
        ce("div",null,ce("div",{style:{fontSize:11,color:"#6e6e73",fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",marginBottom:5}},type==="pct"?"Standard % Satz":"Standardpreis CHF"),ce("input",{type:"number",min:0,value:price,onChange:e=>setPrice(e.target.value),placeholder:type==="pct"?"18":"150",className:"inp"})),
        ce("div",null,ce("div",{style:{fontSize:11,color:"#6e6e73",fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",marginBottom:5}},"Beschreibung (optional)"),ce("input",{type:"text",value:note,onChange:e=>setNote(e.target.value),placeholder:"z.B. pro TN, jährlich…",className:"inp"}))
      )
    ),
    ce("div",{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:22}},
      ce("button",{className:"btn-ghost",onClick:onClose},"Abbrechen"),
      ce("button",{className:"btn-primary",onClick:()=>name.trim()&&onAdd(name.trim(),type,price||0,note),disabled:!name.trim()},"Hinzufügen")
    )
  );
}

function HistoryModal({history,onRestore,onClose,editMode}){
  return ce("div",null,
    ce("div",{style:{fontSize:18,fontWeight:700,marginBottom:4}},"Gespeicherte Versionen"),
    ce("div",{style:{fontSize:13,color:"#6e6e73",marginBottom:18}},history.length+" Versionen gespeichert · Letzte 20 werden behalten"),
    ce("div",{style:{display:"flex",flexDirection:"column",gap:8,maxHeight:400,overflowY:"auto"}},
      history.length===0
        ?ce("div",{style:{color:"#6e6e73",fontSize:13,padding:"20px",textAlign:"center"}},"Noch keine Versionen gespeichert.")
        :history.map((snap,i)=>
          ce("div",{key:i,style:{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:i===0?"#f0f7ff":"#fafafe",borderRadius:12,border:"1px solid "+(i===0?"#b3d4f7":"#e8e8ed")}},
            ce("div",{style:{flex:1}},
              ce("div",{style:{fontSize:13,fontWeight:600,color:"#1a1a2e"}},i===0?"🔵 Neueste Version":"Version "+(i+1)),
              ce("div",{style:{fontSize:12,color:"#6e6e73",marginTop:2}},new Date(snap.savedAt).toLocaleString("de-CH",{weekday:"short",day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})),
              ce("div",{style:{fontSize:11,color:"#8e8e93",marginTop:1}},(snap.clients||[]).length+" Kunden · "+(snap.years||[]).length+" Jahre · "+(snap.products||[]).length+" Produkte")
            ),
            i>0&&ce("button",{
              onClick:()=>editMode?onRestore(snap):alert("Bearbeitungsmodus nötig um wiederherzustellen"),
              style:{padding:"7px 14px",background:editMode?"#fff":"#f0f0f0",border:"1.5px solid "+(editMode?"#0071e3":"#d2d2d7"),color:editMode?"#0071e3":"#8e8e93",borderRadius:16,fontSize:12,fontWeight:600,cursor:editMode?"pointer":"not-allowed",whiteSpace:"nowrap"}
            },"↩ Wiederherstellen")
          )
        )
    ),
    ce("div",{style:{display:"flex",justifyContent:"flex-end",marginTop:16}},
      ce("button",{className:"btn-ghost",onClick:onClose},"Schliessen")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(ce(App));
