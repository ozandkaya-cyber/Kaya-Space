function cy(c,y){const d=c.years[y],p=c.prices,r=d.s*p.s+d.r*p.r+d.v*p.v+d.e*p.e+d.a*p.a+d.u*p.u;return r+(r>0?ADMIN:0);}
function yt(cls,y){return cls.filter(c=>c.active).reduce((s,c)=>s+cy(c,y),0);}
function ct(c){return YEARS.reduce((s,y)=>s+cy(c,y),0);}
function fmt(n){return new Intl.NumberFormat("de-CH",{style:"currency",currency:"CHF",maximumFractionDigits:0}).format(n);}
function fmtK(n){return n>=1e6?(n/1e6).toFixed(1)+"M":n>=1000?(n/1000).toFixed(0)+"k":String(n);}
function aCol(c){if(!c.active)return"#c7c7cc";const t=ct(c);if(t===0)return"#ff3b30";if(c.prob<0.5)return"#ff9500";if(t<20000)return"#ffcc00";return"#34c759";}

// ── Tooltip custom ────────────────────────────────────────────────────────────
function CustomTooltip({active,payload,label}){
  if(!active||!payload||!payload.length)return null;
  return React.createElement("div",{style:{background:"rgba(255,255,255,.96)",borderRadius:12,padding:"10px 14px",boxShadow:"0 4px 20px rgba(0,0,0,.12)",border:"none",fontSize:12}},
    React.createElement("div",{style:{fontWeight:600,color:"#1d1d1f",marginBottom:6}},label),
    payload.map((p,i)=>React.createElement("div",{key:i,style:{color:p.color||"#1d1d1f",display:"flex",justifyContent:"space-between",gap:16}},
      React.createElement("span",null,p.name),React.createElement("span",{style:{fontWeight:600}},fmt(p.value))
    ))
  );
}

  const [importTxt,setImportTxt]=useState("");
  const [importErr,setImportErr]=useState("");
  const [note,setNote]=useState(null);
  const [gsStatus,setGsStatus]=useState("idle"); // idle|loading|ok|err
  const [focusCell,setFocusCell]=useState(null);
  const selC=clients.find(c=>c.id===selId)||null;

  function toast(msg,ok=true){setNote({msg,ok});setTimeout(()=>setNote(null),3000);}
  function updY(id,y,f,v){setClients(p=>p.map(c=>c.id===id?{...c,years:{...c.years,[y]:{...c.years[y],[f]:parseFloat(v)||0}}}:c));}
  function updP(id,f,v){setClients(p=>p.map(c=>c.id===id?{...c,prices:{...c.prices,[f]:parseFloat(v)||0}}:c));}
  function updProp(id,f,v){setClients(p=>p.map(c=>c.id===id?{...c,[f]:v}:c));}

  // Export/Import
  function doExport(){
    const txt=JSON.stringify({v:1,exportedAt:new Date().toISOString(),clients,scen});
    setModal({type:"export",txt});
  }
  function doCopy(){navigator.clipboard.writeText(modal.txt).then(()=>toast("Kopiert ✓")).catch(()=>toast("Manuell kopieren",false));}
  function doImport(){
    setImportErr("");
    try{
      const d=JSON.parse(importTxt.trim());
      if(!d.clients)throw new Error("Ungültiges Format");
      setClients(d.clients);
      if(d.scen)setScen(d.scen);
      setModal(null);setImportTxt("");
      toast("Importiert ✓ Stand: "+new Date(d.exportedAt).toLocaleString("de-CH"));
    }catch(e){setImportErr("Fehler: "+e.message);}
  }

  // Google Sheets sync (read-only via API key — public sheet)
  async function syncFromSheets(){
    if(GS_CONFIG.spreadsheetId==="DEINE_SPREADSHEET_ID"){toast("Bitte erst spreadsheetId & apiKey in der HTML-Datei eintragen",false);return;}
    setGsStatus("loading");
    try{
      const url=`https://sheets.googleapis.com/v4/spreadsheets/${GS_CONFIG.spreadsheetId}/values/Daten!A1:Z200?key=${GS_CONFIG.apiKey}`;
      const res=await fetch(url);
      if(!res.ok)throw new Error("HTTP "+res.status);
      const json=await res.json();
      // Erwartet JSON-String in Zelle A1
      const raw=json.values&&json.values[0]&&json.values[0][0];
      if(!raw)throw new Error("Keine Daten in Sheet");
      const d=JSON.parse(raw);
      if(d.clients)setClients(d.clients);
      if(d.scen)setScen(d.scen);
      setGsStatus("ok");
      toast("Aus Google Sheets geladen ✓");
      setTimeout(()=>setGsStatus("idle"),3000);
    }catch(e){setGsStatus("err");toast("Sync-Fehler: "+e.message,false);setTimeout(()=>setGsStatus("idle"),4000);}
  }

  const totalG=YEARS.reduce((s,y)=>s+yt(clients,y),0);
  const totalW=clients.filter(c=>c.active).reduce((s,c)=>s+ct(c)*c.prob,0);
  const c25=yt(clients,2025),c28=yt(clients,2028);
  const cagr=c25>0?((c28/c25)**(1/3)-1)*100:0;
  const oData=YEARS.map(y=>{const b=yt(clients,y);return{year:String(y),Basis:b,Pessimistisch:Math.round(b*(1+scen.pess/100)),Optimistisch:Math.round(b*(1+scen.opt/100))};});

  const btnSuccess={...btnPrimary,background:C.green};

  const inputStyle={width:"100%",background:"transparent",border:"none",borderBottom:"1.5px solid "+C.border,color:C.blue,fontSize:13,textAlign:"right",padding:"3px 2px",outline:"none",fontFamily:"inherit"};

  const TABS=[["overview","Übersicht"],["kunden","Kunden"],["simulation","Simulation"],["details","Detaileingabe"]];

  return React.createElement("div",{style:{minHeight:"100vh",background:C.bg}},

    // Toast
    note&&React.createElement("div",{style:{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",zIndex:2000,background:note.ok?C.green:C.red,color:"#fff",padding:"10px 20px",borderRadius:20,fontSize:13,fontWeight:500,boxShadow:"0 4px 20px rgba(0,0,0,.15)",whiteSpace:"nowrap"}},note.msg),

    // Modal
    modal&&React.createElement("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(8px)"},onClick:e=>{if(e.target===e.currentTarget){setModal(null);setImportTxt("");setImportErr("");}}},
      React.createElement("div",{style:{background:"#fff",borderRadius:20,padding:28,width:560,maxWidth:"92vw",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}},
        modal.type==="export"?React.createElement(React.Fragment,null,
          React.createElement("div",{style:{fontSize:17,fontWeight:600,color:C.text,marginBottom:4}},"Daten exportieren"),

            React.createElement("button",{style:btnGhost,onClick:()=>setModal(null)},"Schliessen"),
            React.createElement("button",{style:btnSuccess,onClick:doCopy},"Kopieren")

          React.createElement("div",{style:{fontSize:13,color:C.sub,marginBottom:14}},"JSON-Text von Ozan oder Thomas hier einfügen."),
          React.createElement("textarea",{value:importTxt,onChange:e=>setImportTxt(e.target.value),placeholder:"JSON einfügen…",style:{width:"100%",height:160,background:C.bg,border:"1px solid "+(importErr?C.red:C.border),borderRadius:12,color:C.text,fontSize:11,fontFamily:"'SF Mono',monospace",padding:12,resize:"none",outline:"none"}}),
